# TEMPLATE ONLY — do NOT commit real values.
# Copy this to `secret.local.yaml` (gitignored) and fill real values; the base
# kustomization references `secret.local.yaml`, not this file.
# In production prefer External Secrets Operator or Sealed Secrets pulling from
# AWS Secrets Manager (via IRSA). This Opaque Secret shows the required keys.
#
#   cp secret.example.yaml secret.local.yaml   # then edit secret.local.yaml
#   # or imperatively:
#   kubectl create secret generic bcf-secrets -n blockchain-fintech \
#     --from-literal=JWT_SECRET=... --from-literal=AUTH_DATABASE_URL=... ...
apiVersion: v1
kind: Secret
metadata:
  name: bcf-secrets
  namespace: blockchain-fintech
type: Opaque
stringData:
  JWT_SECRET: 'REPLACE_ME'
  JWT_REFRESH_SECRET: 'REPLACE_ME'
  SUPABASE_URL: 'https://YOUR-PROJECT.supabase.co'
  SUPABASE_ANON_KEY: 'REPLACE_ME'
  # service_role bypasses RLS — needed by the user service for Supabase Storage uploads.
  SUPABASE_SERVICE_ROLE_KEY: 'REPLACE_ME'
  AUTH_DATABASE_URL: 'postgresql://...:6543/postgres?schema=app_auth&pgbouncer=true'
  AUTH_DIRECT_URL: 'postgresql://...:5432/postgres?schema=app_auth'
  USER_DATABASE_URL: 'postgresql://...:6543/postgres?schema=users&pgbouncer=true'
  USER_DIRECT_URL: 'postgresql://...:5432/postgres?schema=users'
  WALLET_DATABASE_URL: 'postgresql://...:6543/postgres?schema=wallets&pgbouncer=true'
  WALLET_DIRECT_URL: 'postgresql://...:5432/postgres?schema=wallets'
  BLOCKCHAIN_DATABASE_URL: 'postgresql://...:6543/postgres?schema=blockchain&pgbouncer=true'
  BLOCKCHAIN_DIRECT_URL: 'postgresql://...:5432/postgres?schema=blockchain'
  TRANSACTION_DATABASE_URL: 'postgresql://...:6543/postgres?schema=transactions&pgbouncer=true'
  TRANSACTION_DIRECT_URL: 'postgresql://...:5432/postgres?schema=transactions'
  NOTIFICATION_DATABASE_URL: 'postgresql://...:6543/postgres?schema=notifications&pgbouncer=true'
  NOTIFICATION_DIRECT_URL: 'postgresql://...:5432/postgres?schema=notifications'
  AUDIT_DATABASE_URL: 'postgresql://...:6543/postgres?schema=audit&pgbouncer=true'
  AUDIT_DIRECT_URL: 'postgresql://...:5432/postgres?schema=audit'
