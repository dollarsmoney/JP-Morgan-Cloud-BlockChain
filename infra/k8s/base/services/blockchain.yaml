apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain
  namespace: blockchain-fintech
  labels: { app: blockchain, app.kubernetes.io/part-of: blockchain-fintech }
spec:
  replicas: 2
  selector:
    matchLabels: { app: blockchain }
  template:
    metadata:
      labels: { app: blockchain }
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '5054'
        prometheus.io/path: '/metrics'
    spec:
      serviceAccountName: bcf-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: blockchain
          image: ECR_REGISTRY/bcf-blockchain:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: grpc, containerPort: 50054 }
            - { name: http, containerPort: 5054 }
          envFrom:
            - configMapRef: { name: bcf-config }
            - secretRef: { name: bcf-secrets }
          readinessProbe:
            httpGet: { path: /readyz, port: 5054 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 5054 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: '100m', memory: '192Mi' }
            limits: { cpu: '500m', memory: '512Mi' }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ['ALL'] }
---
apiVersion: v1
kind: Service
metadata:
  name: blockchain
  namespace: blockchain-fintech
  labels: { app: blockchain }
spec:
  type: ClusterIP
  selector: { app: blockchain }
  ports:
    - { name: grpc, port: 50054, targetPort: grpc }
    - { name: http, port: 5054, targetPort: http }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blockchain
  namespace: blockchain-fintech
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: blockchain }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
