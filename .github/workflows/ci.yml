name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Dummy DB URLs so `prisma generate` and typecheck succeed without a real DB.
env:
  AUTH_DATABASE_URL: postgresql://u:p@localhost:5432/db?schema=auth
  AUTH_DIRECT_URL: postgresql://u:p@localhost:5432/db?schema=auth
  USER_DATABASE_URL: postgresql://u:p@localhost:5432/db?schema=users
  USER_DIRECT_URL: postgresql://u:p@localhost:5432/db?schema=users
  WALLET_DATABASE_URL: postgresql://u:p@localhost:5432/db?schema=wallets
  WALLET_DIRECT_URL: postgresql://u:p@localhost:5432/db?schema=wallets
  BLOCKCHAIN_DATABASE_URL: postgresql://u:p@localhost:5432/db?schema=blockchain
  BLOCKCHAIN_DIRECT_URL: postgresql://u:p@localhost:5432/db?schema=blockchain
  TRANSACTION_DATABASE_URL: postgresql://u:p@localhost:5432/db?schema=transactions
  TRANSACTION_DIRECT_URL: postgresql://u:p@localhost:5432/db?schema=transactions
  NOTIFICATION_DATABASE_URL: postgresql://u:p@localhost:5432/db?schema=notifications
  NOTIFICATION_DIRECT_URL: postgresql://u:p@localhost:5432/db?schema=notifications
  AUDIT_DATABASE_URL: postgresql://u:p@localhost:5432/db?schema=audit
  AUDIT_DIRECT_URL: postgresql://u:p@localhost:5432/db?schema=audit

jobs:
  build-test:
    name: Build, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared library
        run: npm run build -w @blockchain/common

      - name: Generate Prisma clients
        run: |
          for s in auth user wallet blockchain transaction notification audit; do
            npx prisma generate --schema services/$s/prisma/schema.prisma
          done

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Frontend build
        run: npm run build -w @blockchain/frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1

  docker-build:
    name: Validate Docker builds
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      matrix:
        service: [api-gateway, auth, user, wallet, blockchain, transaction, notification, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
