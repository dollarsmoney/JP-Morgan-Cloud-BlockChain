name: security-checks

# GATE 2 — DevSecOps gate. Runs in CI on every push and PR. Branch protection
# should mark these checks "required" so nothing merges while a gate is red.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # weekly baseline scan (catches newly disclosed CVEs)

permissions:
  contents: read
  security-events: write # upload SARIF to the GitHub Security tab

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) Secret scanning ------------------------------------------------------
  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks (hardcoded secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2) SAST — static analysis of our own TypeScript -------------------------
  sast:
    name: SAST (CodeQL — JS/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  # 3) SCA — known CVEs in our dependencies ---------------------------------
  dependencies:
    name: SCA (npm audit + Trivy fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: npm audit (production deps, fail on high/critical)
        run: npm audit --omit=dev --audit-level=high
      - name: Trivy filesystem scan (deps + misconfig + secrets)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-fs.sarif
      - name: Upload Trivy fs SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # 4) IaC scanning — Terraform + Kubernetes + Dockerfiles ------------------
  iac:
    name: IaC misconfig (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: checkov (IaC misconfiguration)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          skip_path: node_modules,frontend/.next
          framework: terraform,kubernetes,dockerfile,github_actions
          quiet: true
          soft_fail: false
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov

  # 5) Container image scanning — only after IaC passes ---------------------
  image:
    name: Image scan (Trivy)
    needs: [iac]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: api-gateway, file: services/api-gateway/Dockerfile }
          - { service: auth, file: services/auth/Dockerfile }
          - { service: user, file: services/user/Dockerfile }
          - { service: wallet, file: services/wallet/Dockerfile }
          - { service: blockchain, file: services/blockchain/Dockerfile }
          - { service: transaction, file: services/transaction/Dockerfile }
          - { service: notification, file: services/notification/Dockerfile }
          - { service: audit, file: services/audit/Dockerfile }
          - { service: frontend, file: frontend/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: bcf-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: trivy (image vulnerabilities, fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: bcf-${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  # GATE 3 — passes only if every security gate above is green --------------
  security-gate:
    name: Security gate
    needs: [secrets, sast, dependencies, iac, image]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Enforce all gates passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more security gates failed."; exit 1
          fi
          echo "All security gates passed — safe to deploy."
