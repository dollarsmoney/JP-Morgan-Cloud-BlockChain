name: CD

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write # OIDC for AWS
  contents: write # to commit updated image tags (GitOps)

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }} # e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-push:
    name: Build & push images to ECR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { service: api-gateway, file: services/api-gateway/Dockerfile }
          - { service: auth, file: services/auth/Dockerfile }
          - { service: user, file: services/user/Dockerfile }
          - { service: wallet, file: services/wallet/Dockerfile }
          - { service: blockchain, file: services/blockchain/Dockerfile }
          - { service: transaction, file: services/transaction/Dockerfile }
          - { service: notification, file: services/notification/Dockerfile }
          - { service: audit, file: services/audit/Dockerfile }
          - { service: frontend, file: frontend/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/bcf-${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/bcf-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    name: Bump image tags (GitOps)
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Set image tags in overlay
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          cd infra/k8s/overlays/$ENV
          for s in api-gateway auth user wallet blockchain transaction notification audit frontend; do
            kustomize edit set image ECR_REGISTRY/bcf-$s=${ECR_REGISTRY}/bcf-$s:${{ github.sha }}
          done

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays
          git commit -m "ci: deploy ${GITHUB_SHA::7} [skip ci]" || echo "no changes"
          git push
