apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: blockchain-fintech
  labels: { app: frontend, app.kubernetes.io/part-of: blockchain-fintech }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      serviceAccountName: bcf-app
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: frontend
          image: ECR_REGISTRY/bcf-frontend:latest
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: 'https://api.blockchain-fintech.example.com/api/v1'
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: '100m', memory: '192Mi' }
            limits: { cpu: '500m', memory: '512Mi' }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ['ALL'] }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: blockchain-fintech
  labels: { app: frontend }
spec:
  type: ClusterIP
  selector: { app: frontend }
  ports:
    - { name: http, port: 3000, targetPort: http }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: blockchain-fintech
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: frontend }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
