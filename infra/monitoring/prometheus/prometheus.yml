global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: blockchain-fintech-local

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: api-gateway
    static_configs:
      - targets: ['api-gateway:4000']

  - job_name: blockchain-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'auth:5051'
          - 'user:5052'
          - 'wallet:5053'
          - 'blockchain:5054'
          - 'transaction:5055'
          - 'notification:5056'
          - 'audit:5057'
        labels:
          tier: backend
