apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blockchain-fintech-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: blockchain-fintech
  source:
    repoURL: https://github.com/YOUR_ORG/blockchain-fintech.git
    targetRevision: main
    path: infra/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: blockchain-fintech
  syncPolicy:
    # Prod syncs are gated: ArgoCD detects drift but a human approves the sync.
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
