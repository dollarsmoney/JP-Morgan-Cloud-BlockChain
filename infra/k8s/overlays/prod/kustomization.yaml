apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: blockchain-fintech

resources:
  - ../../base

images:
  - { name: ECR_REGISTRY/bcf-auth, newName: ACCOUNT.dkr.ecr.REGION.amazonaws.com/bcf-auth, newTag: stable }
  - { name: ECR_REGISTRY/bcf-user, newName: ACCOUNT.dkr.ecr.REGION.amazonaws.com/bcf-user, newTag: stable }
  - { name: ECR_REGISTRY/bcf-wallet, newName: ACCOUNT.dkr.ecr.REGION.amazonaws.com/bcf-wallet, newTag: stable }
  - { name: ECR_REGISTRY/bcf-blockchain, newName: ACCOUNT.dkr.ecr.REGION.amazonaws.com/bcf-blockchain, newTag: stable }
  - { name: ECR_REGISTRY/bcf-transaction, newName: ACCOUNT.dkr.ecr.REGION.amazonaws.com/bcf-transaction, newTag: stable }
  - { name: ECR_REGISTRY/bcf-notification, newName: ACCOUNT.dkr.ecr.REGION.amazonaws.com/bcf-notification, newTag: stable }
  - { name: ECR_REGISTRY/bcf-audit, newName: ACCOUNT.dkr.ecr.REGION.amazonaws.com/bcf-audit, newTag: stable }
  - { name: ECR_REGISTRY/bcf-api-gateway, newName: ACCOUNT.dkr.ecr.REGION.amazonaws.com/bcf-api-gateway, newTag: stable }
  - { name: ECR_REGISTRY/bcf-frontend, newName: ACCOUNT.dkr.ecr.REGION.amazonaws.com/bcf-frontend, newTag: stable }

# Production hardening: spread replicas across nodes/AZs.
patches:
  - target: { kind: Deployment, labelSelector: 'app.kubernetes.io/part-of=blockchain-fintech' }
    patch: |
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels: {}
