syntax = "proto3";

package notification;

service NotificationService {
  rpc ListNotifications(ListNotificationsRequest) returns (NotificationList);
  rpc MarkRead(MarkReadRequest) returns (Notification);
  rpc MarkAllRead(MarkAllReadRequest) returns (MarkAllReadResponse);
  rpc UnreadCount(UnreadCountRequest) returns (UnreadCountResponse);
}

message Notification {
  string id = 1;
  string user_id = 2;
  string type = 3;
  string title = 4;
  string body = 5;
  bool read = 6;
  string metadata = 7;   // JSON string
  string created_at = 8;
}

message ListNotificationsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  bool unread_only = 4;
}

message NotificationList {
  repeated Notification notifications = 1;
  int32 total = 2;
}

message MarkReadRequest {
  string user_id = 1;
  string notification_id = 2;
}

message MarkAllReadRequest {
  string user_id = 1;
}

message MarkAllReadResponse {
  int32 updated = 1;
}

message UnreadCountRequest {
  string user_id = 1;
}

message UnreadCountResponse {
  int32 count = 1;
}
